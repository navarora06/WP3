services:
  web:
    build: .
    env_file: .env
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
      - ./storage:/app/storage
      - hf_cache:/app/.cache/huggingface
    depends_on:
      - db
      - redis

  worker:
    build: .
    env_file: .env
    command: celery -A tasks.celery_app worker --loglevel=INFO
    volumes:
      - ./:/app
      - ./storage:/app/storage
      - hf_cache:/app/.cache/huggingface
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tacitgap
      POSTGRES_USER: tacitgap
      POSTGRES_PASSWORD: tacitgap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
  hf_cache:
