services:
  web:
    build: .
    env_file: .env
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    env_file: .env
    command: celery -A tasks.celery_app worker --loglevel=INFO
    volumes:
      - ./:/app
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tacitgap
      POSTGRES_USER: tacitgap
      POSTGRES_PASSWORD: tacitgap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tacitgap -d tacitgap"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
